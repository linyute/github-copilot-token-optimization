site_name: Token 優化指南
site_description: 實用指南，在保持品質的前提下降低 GitHub Copilot 的 token 使用量。
theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
extra_css:
  - stylesheets/extra.css
nav:
  - 首頁: index.md
  - 第 1 部分:
      - 為什麼 Token 很重要: 01-why-tokens-matter.md
  - 第 2 部分:
      - 提示詞壓縮: 02-prompt-compression.md
      - 自然語言選擇: 03-language-comparison.md
      - 上下文管理: 04-context-management.md
      - 輸出控制: 05-output-control.md
      - 工作流優化: 06-workflow-optimization.md
      - 始終開啟的上下文問題: 07-agents-md-problem.md
      - MCP 和工具成本: 08-mcp-tool-costs.md
  - 第 3 部分:
      - 對比與數據: 09-comparisons-data.md
  - 第 4 部分:
      - 實踐設置: 10-practical-setup.md
      - 模型選擇與定價: 11-models-and-pricing.md
      - 企業治理: 12-enterprise-governance.md
